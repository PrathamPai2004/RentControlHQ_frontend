<div class="section-header">
  <h2 class="section-title">📋 Bookings</h2>
  <p class="section-sub">Manage all booking requests</p>
</div>

<div *ngIf="actionMsg" class="action-toast">{{ actionMsg }}</div>
<div *ngIf="loading" class="state-msg">Loading bookings…</div>
<div *ngIf="error" class="state-msg error-msg">{{ error }}</div>

<div *ngIf="!loading && bookings.length === 0 && !error" class="state-msg">
  No bookings found.
</div>

<div class="table-wrap" *ngIf="!loading && bookings.length > 0">
  <table>
    <thead>
      <tr>
        <th>Booking ID</th>
        <th>User ID</th>
        <th>Unit ID</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let b of bookings">
        <td>#{{ b.id }}</td>
        <td>{{ b.user_id }}</td>
        <td>{{ b.unit_id }}</td>
        <td>
          <span class="badge"
            [class.badge-pending]="b.status === 'pending'"
            [class.badge-approved]="b.status === 'approved'"
            [class.badge-rejected]="b.status === 'rejected'"
          >{{ b.status }}</span>
        </td>
        <td>
          <button
            *ngIf="b.status === 'pending'"
            class="btn btn-approve"
            (click)="approve(b.id)"
          >Approve</button>
          <button
            *ngIf="b.status === 'pending'"
            class="btn btn-reject"
            (click)="reject(b.id)"
          >Reject</button>
          <span *ngIf="b.status !== 'pending'" style="color:rgba(255,255,255,0.3); font-size:0.8rem;">—</span>
        </td>
      </tr>
    </tbody>
  </table>
</div>
