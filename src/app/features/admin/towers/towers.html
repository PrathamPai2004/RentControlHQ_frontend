<div class="section-header">
  <div class="header-row">
    <div>
      <h2 class="section-title">🏢 Towers</h2>
      <p class="section-sub">All registered towers in the system</p>
    </div>
    <button class="btn-add" (click)="showForm = !showForm">
      {{ showForm ? '✕ Cancel' : '＋ Add Tower' }}
    </button>
  </div>
</div>

<!-- Add Tower Form -->
<div class="inline-form" *ngIf="showForm">
  <h3 class="form-title">Add New Tower</h3>
  <div class="form-row">
    <div class="form-group">
      <label>Tower Name</label>
      <input type="text" [(ngModel)]="newName" placeholder="e.g. Tower C" />
    </div>
    <div class="form-group">
      <label>Total Units</label>
      <input type="number" [(ngModel)]="newTotalUnits" placeholder="e.g. 50" min="1" />
    </div>
    <button class="btn-submit" (click)="addTower()" [disabled]="adding || !newName || !newTotalUnits">
      {{ adding ? 'Adding…' : 'Add Tower' }}
    </button>
  </div>
  <p class="form-success" *ngIf="addMsg">{{ addMsg }}</p>
  <p class="form-error" *ngIf="addError">{{ addError }}</p>
</div>

<div *ngIf="loading" class="state-msg">Loading towers…</div>
<div *ngIf="error" class="state-msg error-msg">{{ error }}</div>
<div *ngIf="!loading && towers.length === 0 && !error" class="state-msg">No towers found.</div>

<div class="card-grid" *ngIf="!loading && towers.length > 0">
  <div class="card" *ngFor="let tower of towers">
    <div class="card-icon">🏢</div>
    <div class="card-body">
      <h3 class="card-title">{{ tower.name }}</h3>
      <p class="card-meta">Tower ID: <strong>#{{ tower.id }}</strong></p>
      <p class="card-meta">Total Units: <strong>{{ tower.total_units }}</strong></p>
    </div>
  </div>
</div>
