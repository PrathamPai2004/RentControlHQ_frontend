<div class="section-header">
  <div class="header-row">
    <div>
      <h2 class="section-title">🚪 Units</h2>
      <p class="section-sub">View and manage units by tower</p>
    </div>
    <button class="btn-add" (click)="showForm = !showForm">
      {{ showForm ? '✕ Cancel' : '＋ Add Unit' }}
    </button>
  </div>
</div>

<!-- Add Unit Form -->
<div class="inline-form" *ngIf="showForm">
  <h3 class="form-title">Add New Unit</h3>
  <div class="form-row">
    <div class="form-group">
      <label>Tower</label>
      <select [(ngModel)]="newTowerId">
        <option [ngValue]="null">— Select Tower —</option>
        <option *ngFor="let t of towers" [ngValue]="t.id">{{ t.name }} (#{{ t.id }})</option>
      </select>
    </div>
    <div class="form-group">
      <label>Unit Number</label>
      <input type="number" [(ngModel)]="newUnitNumber" placeholder="e.g. 101" min="1" />
    </div>
    <div class="form-group">
      <label>Monthly Rent (₹)</label>
      <input type="number" [(ngModel)]="newRent" placeholder="e.g. 15000" min="1" />
    </div>
    <button class="btn-submit" (click)="addUnit()" [disabled]="adding || !newTowerId || !newUnitNumber || !newRent">
      {{ adding ? 'Adding…' : 'Add Unit' }}
    </button>
  </div>
  <p class="form-success" *ngIf="addMsg">{{ addMsg }}</p>
  <p class="form-error" *ngIf="addError">{{ addError }}</p>
</div>

<!-- View units by tower -->
<div class="tower-picker" *ngIf="!towersLoading">
  <label style="color:rgba(255,255,255,0.55); font-size:0.85rem; margin-bottom:8px; display:block;">Filter by Tower</label>
  <select id="towerSelect" [(ngModel)]="selectedTowerId" (change)="loadUnits()" class="tower-select">
    <option [ngValue]="null">— Select a Tower to view units —</option>
    <option *ngFor="let t of towers" [ngValue]="t.id">{{ t.name }} (#{{ t.id }})</option>
  </select>
</div>

<div *ngIf="towersLoading" class="state-msg">Loading towers…</div>
<div *ngIf="loading" class="state-msg">Loading units…</div>
<div *ngIf="error" class="state-msg error-msg">{{ error }}</div>
<div *ngIf="!loading && selectedTowerId && units.length === 0 && !error" class="state-msg">No units in this tower.</div>

<div class="table-wrap" *ngIf="!loading && units.length > 0">
  <table>
    <thead>
      <tr>
        <th>Unit ID</th>
        <th>Unit No.</th>
        <th>Tower</th>
        <th>Rent (₹)</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let u of units">
        <td>#{{ u['unit id'] }}</td>
        <td>{{ u.unit_number }}</td>
        <td>{{ u.tower_id }}</td>
        <td>₹{{ u.rent }}</td>
        <td>
          <span class="badge"
            [class.badge-available]="u.status === 'available'"
            [class.badge-booked]="u.status === 'booked'"
          >{{ u.status }}</span>
        </td>
      </tr>
    </tbody>
  </table>
</div>
