<div class="section-header">
  <h2 class="section-title">🚪 Browse Units</h2>
  <p class="section-sub">Select a tower to see available units and book one</p>
</div>

<div *ngIf="bookingMsg" class="toast">{{ bookingMsg }}</div>
<div *ngIf="bookingError" class="toast error">{{ bookingError }}</div>

<div class="tower-picker" *ngIf="!towersLoading">
  <select id="unitTowerSelect" [(ngModel)]="selectedTowerId" (change)="loadUnits()" class="tower-select">
    <option [ngValue]="null">— Select a Tower —</option>
    <option *ngFor="let t of towers" [ngValue]="t.id">{{ t.name }} (ID: #{{ t.id }})</option>
  </select>
</div>

<div *ngIf="towersLoading" class="state-msg">Loading towers…</div>
<div *ngIf="loading" class="state-msg">Loading units…</div>
<div *ngIf="!loading && selectedTowerId && units.length === 0 && !loading" class="state-msg">
  No available units in this tower.
</div>

<div class="card-grid" *ngIf="!loading && units.length > 0">
  <div class="card" *ngFor="let unit of units">
    <div class="card-header">
      <div class="card-icon">🚪</div>
      <div>
        <h3 class="card-title">Unit {{ unit.unit_number }}</h3>
        <p class="card-meta">Tower ID: <strong>#{{ unit.tower_id }}</strong></p>
      </div>
    </div>
    <p class="card-meta">Monthly Rent: <strong>₹{{ unit.rent }}</strong></p>
    <p class="card-meta">Status:
      <span class="badge" [class.badge-available]="unit.status === 'available'" [class.badge-booked]="unit.status !== 'available'">
        {{ unit.status }}
      </span>
    </p>
    <button
      class="btn-book"
      [disabled]="unit.status !== 'available' || bookingInProgress === unit['unit id']"
      (click)="bookUnit(unit['unit id'])"
    >
      {{ bookingInProgress === unit['unit id'] ? 'Booking…' : '📋 Book This Unit' }}
    </button>
  </div>
</div>
