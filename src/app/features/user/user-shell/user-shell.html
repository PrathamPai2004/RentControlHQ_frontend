<div class="user-layout">

  <!-- Full-screen overlay + centered modal nav -->
  <div class="nav-modal-backdrop" [class.open]="drawerOpen" (click)="closeDrawer()">
    <div class="nav-modal" [class.open]="drawerOpen" (click)="$event.stopPropagation()">

      <!-- Modal header -->
      <div class="nav-modal-header">
        <div class="sidebar-brand">
          <span class="brand-icon">🏠</span>
          <span class="brand-name">RentControlHQ</span>
        </div>
        <button class="close-btn" (click)="closeDrawer()" aria-label="Close">
          <span>✕</span>
          <span class="esc-hint">ESC</span>
        </button>
      </div>

      <!-- Nav links (big, centered) -->
      <nav class="nav-modal-links">
        <a
          *ngFor="let item of navItems"
          [routerLink]="item.route"
          routerLinkActive="active"
          class="modal-nav-item"
          (click)="closeDrawer()"
        >
          <span class="nav-icon">{{ item.icon }}</span>
          <span class="nav-label">{{ item.label }}</span>
        </a>
      </nav>

      <!-- Footer: user + logout -->
      <div class="nav-modal-footer">
        <div class="user-pill">
          <span class="user-avatar">👤</span>
          <div>
            <p class="user-name">{{ userName }}</p>
            <p class="user-role">Tenant</p>
          </div>
        </div>
        <button class="logout-btn" (click)="logout()">🚪 Logout</button>
      </div>

    </div>
  </div>

  <!-- Main content -->
  <div class="main-content">
    <header class="topbar">
      <button class="hamburger-btn" (click)="openDrawer()" aria-label="Open menu" title="Open menu (press i)">
        <span></span><span></span><span></span>
      </button>
      <h1 class="topbar-title">Rental Portal</h1>
      <div class="topbar-user">
        <span class="avatar">👤</span>
        <span class="user-display-name">{{ userName }}</span>
      </div>
    </header>

    <div class="page-content">
      <router-outlet></router-outlet>
    </div>
  </div>

</div>
